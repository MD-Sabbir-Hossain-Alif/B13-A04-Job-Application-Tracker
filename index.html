<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Md. Sabbir Hossain Alif">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link rel="shortcut icon" href="jobs.png" type="image/x-icon">

    <!-- google font: Geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- daisy UI + Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fontawsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }

        html,
        body {
            background-color: #F8FAFC;
        }

        .container {
            max-width: 1600px;

        }
    </style>
</head>

<body>
    <!-- header section -->
    <header class="container mx-auto mt-8 px-4 sm:px-6 md:px-0 w-full md:w-[70%] space-y-5">

        <h1 class="text-[#002C5C] font-bold text-xl sm:text-2xl md:text-[2rem]">
            Job Application Tracker
        </h1>

        <div class="grid grid-cols-3 gap-4">

            <div class="p-4 sm:p-5 bg-white border border-[#F1F2F4] shadow ">
                <h2 class="text-[#323B49] text-lg sm:text-xl">Total</h2>
                <p class="total text-[#002C5C] text-xl sm:text-2xl font-bold">0</p>
            </div>

            <div class="p-4 sm:p-5 bg-white border border-[#F1F2F4] shadow ">
                <h2 class="text-[#323B49] text-lg sm:text-xl">Interview</h2>
                <p id="interview" class="text-green-600 text-xl sm:text-2xl font-bold">0</p>
            </div>

            <div class="p-4 sm:p-5 bg-white border border-[#F1F2F4] shadow ">
                <h2 class="text-[#323B49] text-lg sm:text-xl">Rejected</h2>
                <p id="rejected" class="text-red-600 text-xl sm:text-2xl font-bold">0</p>
            </div>
        </div>

    </header>

    <hr class="container mx-auto my-6 sm:my-8 px-4 sm:px-6 md:px-0 w-full md:w-[70%] border-[#E6E7E9]">

    <!-- main section -->
    <main class="mx-auto mt-6 sm:mt-8 w-full md:w-[70%] px-4 sm:px-6 md:px-0">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-[#002C5C] text-xl sm:text-2xl md:text-[2rem] font-semibold">Available Jobs</h2>
            <p class="text-[#64748B] font-medium"><span class="total">0</span> jobs</p>
        </div>
        <section id="jobs-container" class="space-y-4">
            <div id="tabs" class="fext gap-2">
                <button onclick="toggle('all-tab')" id="all-tab" class="btn w-20 px-3 py-2 bg-[#3B82F6] text-white">All</button>
                <button onclick="toggle('interview-tab')" id="interview-tab" class="btn px-3 py-2 text-[#64748B] ">Interview</button>
                <button onclick="toggle('rejected-tab')" id="rejected-tab" class="btn px-3 py-2 text-[#64748B]">Rejected</button>
            </div>

            <!-- cards -->
            <section id="cards">
                <div class="card p-6 bg-white border border-[#F1F2F4] shadow space-y-4">
                    <div class="flex justify-between items-center">
                        <div class="space-y-1">
                            <h3 class="companyName text-[#002C5C] text-xl sm:text-2xl md:text-[2rem] font-semibold">Mobile
                                First Corp</h3>
                            <p class="position text-[#64748B]">React Native Developer</p>
                        </div>

                        <div>
                            <button class="btn btn-circle text-[#64748B] border-2 border-[#F1F2F4]">
                                <i class="fa-regular fa-trash-can"></i>
                            </button>
                        </div>

                    </div>

                    <div>
                        <p class="text-[#64748B] text-sm"><span class="location">Remote</span> • <span
                                class="type">Full-time</span> • <span class="salary">$130,000 - $175,000</span></p>
                    </div>

                    <div class="space-y-2">
                        <button class="btn-status btn bg-[#EEF4FF] uppercase font-medium">Not Applied</button>
                        <p class="description text-[#323B49] text-sm">Build cross-platform mobile applications using
                            React Native. Work on products used by millions of users worldwide.</p>
                    </div>

                    <div class="space-x-2">
                        <button class="btn-interview btn btn-outline btn-success uppercase">interview</button>
                        <button class="btn-rejected btn btn-outline btn-error uppercase">Rejected</button>
                    </div>
                </div>
            </section>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
