<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Md. Sabbir Hossain Alif">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link rel="shortcut icon" href="jobs.png" type="image/x-icon">

    <!-- google font: Geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- daisy UI + Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- daisy UI themes -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <!-- fontawsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }

        html,
        body {
            background-color: #F8FAFC;
        }

        .container {
            max-width: 1600px;
            width: 70%;
        }
    </style>
</head>

<body>
    <header class="container mx-auto mt-15 space-y-5">

        <h1 class="text-[#002C5C] font-bold text-[2rem]">Job Application Tracker</h1>
        <div class="grid grid-cols-3 gap-4">
            <div class="p-5 bg-white border border-[#F1F2F4] shadow">
                <h2 class="text-[#323B49] text-xl">Total</h2>
                <p id="total" class="text-[#002C5C] text-2xl font-bold">0</p>
            </div>
            <div class="p-5 bg-white border border-[#F1F2F4] shadow">
                <h2 class="text-[#323B49] text-xl">Interview</h2>
                <p id="interview" class="text-green-600 text-2xl font-bold">0</p>
            </div>
            <div class="p-5 bg-white border border-[#F1F2F4] shadow">
                <h2 class="text-[#323B49] text-xl">Rejected</h2>
                <p id="rejected" class="text-red-600 text-2xl font-bold">0</p>
            </div>
        </div>

    </header>

    <hr class="container mx-auto my-8 border-[#E6E7E9]">

    <main class="container mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-[#002C5C] text-xl font-semibold">Available Jobs</h2>
            <p id="total" class="text-[#64748B] font-medium">8 jobs</p>
        </div>
        <section id="jobs-container" class="space-y-4">
            <div id="btn" class="fext gap-2">
                <button id="all-btn" class="btn w-20 px-3 py-2 bg-[#3B82F6] text-white">All</button>
                <button id="all-btn" class="btn px-3 py-2 text-[#64748B] ">Interview</button>
                <button id="all-btn" class="btn px-3 py-2 text-[#64748B]">Rejected</button>
            </div>
            <section id="card-content">
                <div class="card p-6 bg-white border border-[#F1F2F4] shadow">

                </div>
            </section>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
